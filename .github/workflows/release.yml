name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build and package
        run: |
          set -euo pipefail
          xcodebuild \
            -project MacAuthenticator.xcodeproj \
            -scheme MacAuthenticator \
            -configuration Release \
            -derivedDataPath build \
            build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=YES
          APP_PATH="build/Build/Products/Release/MacAuthenticator.app"
          test -d "$APP_PATH"
          mkdir -p dist
          ditto -c -k --keepParent "$APP_PATH" dist/MacAuthenticator.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MacAuthenticator.zip
          generate_release_notes: true
          body: |
            ## Install

            1. Download **MacAuthenticator.zip** below
            2. Drag **MacAuthenticator.app** to **Applications**
            3. **Right-click → Open** the first time (unsigned build — free to distribute, no Apple Developer account needed)
            4. Click the shield in your menu bar

            ## Requirements

            - macOS 13.0+ (Apple Silicon)

            ## Notes

            This build is ad-hoc signed. macOS Gatekeeper may ask you to confirm on first launch.
